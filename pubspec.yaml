name: sticcker
description: "Sticker pack creator for WhatsApp & Telegram"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State Management
  flutter_riverpod: ^2.6.1

  # Database & Storage
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1

  # Networking
  dio: ^5.7.0

  # Media Picking
  image_picker: ^1.1.2
  file_picker: ^8.1.7

  # Image Processing
  image: ^4.5.3
  image_cropper: ^8.0.2
  flutter_image_compress: ^2.3.0

  # Video Processing
  ffmpeg_kit_flutter_new: ^4.1.0

  # UI & Utils
  uuid: ^4.5.1
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
